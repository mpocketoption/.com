<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pocket Option</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: Arial, sans-serif;
    background: linear-gradient(180deg, #0c3a66, #062c4a);
    color: white;
}

/* MAIN LAYOUT */
.container {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 25px 20px;
    box-sizing: border-box;
}

/* LOGO */
.logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 22px;
    font-weight: bold;
    margin-top: 10px;
}

.logo-img {
    width: 34px;
    height: 34px;
    object-fit: contain;
}

/* TITLE */
h1 {
    margin-top: 35px;
    font-size: 24px;
    font-weight: 700;
    text-align: center;
    line-height: 1.3;
    max-width: 320px;
}

/* LANGUAGE */
.lang {
    margin-top: 15px;
    font-size: 14px;
    opacity: 0.8;
}

/* CHART */
.chart {
    margin-top: 25px;
    width: 280px;
}

.chart img {
    width: 100%;
    border-radius: 10px;
}

/* BUTTON */
.btn {
    margin-top: 30px;
    width: 100%;
    max-width: 320px;
    padding: 15px;
    border-radius: 12px;
    font-size: 16px;
    font-weight: bold;
    text-align: center;
    background: linear-gradient(90deg, #1f7fff, #0057ff);
    box-shadow: 0 8px 20px rgba(0, 87, 255, 0.3);
    cursor: pointer;
    transition: 0.2s;
}

.btn:hover {
    transform: scale(1.02);
}

/* FOOTER */
.footer {
    margin-top: 20px;
    font-size: 14px;
    opacity: 0.9;
}

.footer a {
    color: #66b3ff;
    text-decoration: none;
}
</style>

</head>

<body>

<div class="container">

    <div class="logo">
        <img src="logo.png" alt="Pocket Option Logo" class="logo-img">
        PocketOption
    </div>

    <h1>Welcome to the cutting-edge trading platform</h1>

    <div class="lang">🌐 English ▼</div>

    <div class="chart">
        <img src="PO.png" alt="chart">
    </div>

    <div class="btn">REGISTRATION</div>

    <div class="footer">
        Already registered? <a href="#">Sign in</a>
    </div>

</div>

</body>
</html>
