<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Account Top-up</title>

<style>
:root {
    --bg: #0b0e14;
    --card: #1a202c;
    --card-light: #222a38;
    --text-muted: #8a94a6;
    --blue: #00a8ff;
    --green: #00c853;
}

/* 🔥 PAGE */
body {
    margin: 0;
    background: #0c1324;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

/* 🔥 CONTENT */
.topup-page {
    padding: 18px;
    padding-bottom: 120px;
}

/* 🔥 TITLE */
.page-title {
    font-size: 26px;
    font-weight: 600;
    margin-bottom: 22px;
}

/* 🔥 TOP CARDS */
.topup-card {
    display: flex;
    align-items: center;
    justify-content: space-between;

    background: #1a2238;
    border-radius: 16px;
    padding: 18px;
    margin-bottom: 14px;

    overflow: hidden;
}

/* gradient card */
.glow-card {
    background: linear-gradient(135deg, #0b6a88, #1a2238);
}

/* text */
.topup-card h3 {
    margin: 0;
    font-size: 16px;
    font-weight: 600;
}

.topup-card p {
    margin: 6px 0 0;
    font-size: 13px;
    color: #9aa4b2;
}

/* icon (image style) */
.card-icon {
    font-size: 42px;
    opacity: 0.95;
}

/* 🔥 FORM */
.form-group {
    margin-top: 20px;
}

.form-group label {
    font-size: 13px;
    color: #9aa4b2;
    display: block;
    margin-bottom: 8px;
}

/* inputs */
.input-select,
.input-search {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 10px;

    padding: 14px 14px;

    display: flex;
    justify-content: space-between;
    align-items: center;

    color: #cfd6e4;
    font-size: 14px;
}

/* 🔥 SECTION TITLE */
.section-title {
    margin: 26px 0 12px;
    font-size: 14px;
    color: #9aa4b2;

    display: flex;
    align-items: center;
    gap: 10px;
}

/* dashed line */
.section-title::after {
    content: "";
    flex: 1;
    height: 1px;
    border-bottom: 1px dashed rgba(255,255,255,0.2);
}

/* 🔥 METHOD CARD */
.method-card {
    background: #121a30;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 14px;

    margin-bottom: 14px;
    overflow: hidden;
}

/* top row */
.method-left {
    display: flex;
    align-items: center;
    gap: 12px;

    padding: 16px;
    font-size: 15px;
    font-weight: 500;
}

/* icon (bigger like screenshot) */
.method-icon {
    font-size: 28px;
}

/* divider */
.method-bottom {
    display: flex;
    justify-content: space-between;

    padding: 12px 16px;

    font-size: 13px;
    color: #9aa4b2;

    border-top: 1px solid rgba(255,255,255,0.1);
}

/* split line like screenshot */
.method-bottom span {
    flex: 1;
    text-align: center;
}

.method-bottom span:first-child {
    border-right: 1px solid rgba(255,255,255,0.1);
}
/* 🔥 HEADER CONTAINER */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;

    padding: 12px 16px;
    position: relative;
    z-index: 50;
}

/* 🔥 subtle bottom glow line */
.header::after {
    content: "";
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 1px;

    background: linear-gradient(
        to right,
        transparent,
        rgba(0, 168, 255, 0.7),
        transparent
    );

    box-shadow: 0 0 8px rgba(0,168,255,0.6);
}

/* 🔥 LEFT SIDE */
.header-left {
    display: flex;
    align-items: center;
    gap: 14px; /* tighter than 48px */
}

/* 🔥 PROFILE */
.profile-container {
    width: 42px;
    height: 42px;

    background: #2d3748;
    border-radius: 50%;

    border: 2px solid #00c853;

    display: flex;
    align-items: center;
    justify-content: center;

    position: relative;
}

.profile-container {
    position: relative;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: 2px solid #00c853;
}

.profile-badge {
    position: absolute;

    width: 14px;
    height: 14px;

    background: #00c853;
    border: 2px solid #0b0e14;
    border-radius: 50%;

    top: 0;
    right: 0;

    transform: translate(35%, -35%); /* 🔥 THIS FIXES IT */

    display: flex;
    align-items: center;
    justify-content: center;
}

/* 🔥 GIFT ICON */
.gift-box {
    width: 42px;
    height: 42px;

    background: rgba(255,255,255,0.04);
    border-radius: 12px;

    display: flex;
    align-items: center;
    justify-content: center;

    backdrop-filter: blur(4px);
}

.gift-svg {
    width: 24px;
    height: 24px;
    filter: drop-shadow(0 0 6px rgba(0,168,255,0.6));
}

/* 🔥 RIGHT SIDE */
.header-right {
    display: flex;
    align-items: center;
    gap: 10px;
}

/* 🔥 BALANCE */
.balance-pill {
    background: rgba(17,21,28,0.95);
    border: 1px solid rgba(0, 200, 83, 0.4);

    border-radius: 12px;
    padding: 6px 12px;
    min-width: 95px;

    backdrop-filter: blur(6px);
}

.balance-label {
    font-size: 10px;
    color: #8a94a6;
}

.balance-val {
    font-size: 16px;
    font-weight: 700;
    color: #00c853;

    display: flex;
    align-items: center;
    justify-content: space-between;
}

/* 🔥 WALLET BUTTON */
.wallet-btn {
    width: 42px;
    height: 42px;

    border-radius: 12px;

    background: radial-gradient(circle at top left, #065f46, #043d2e);
    border: 1px solid #00c853;

    display: flex;
    align-items: center;
    justify-content: center;
}

.wallet-btn svg {
    width: 22px;
    height: 22px;
    stroke: #00c853;
    stroke-width: 2.2;
}
/* 🔥 BOTTOM NAV CONTAINER */
/* 🔥 FIXED BOTTOM NAV */
.bottom-nav {
    position: fixed;   /* 🔥 KEY */
    bottom: 0;
    left: 0;
    width: 100%;

    background: #0b0e14;

    display: flex;
    justify-content: space-between;
    gap: 6px;

    padding: 5px 7px calc(20px + env(safe-area-inset-bottom));

    z-index: 9999; /* always on top */
}

/* 🔥 TOP GLOW LINE */
.bottom-nav::before {
    content: "";
    position: absolute;
    top: 0;
    left: 10%;
    width: 80%;
    height: 1px;

    background: linear-gradient(
        to right,
        transparent,
        rgba(0, 200, 83, 0.6),
        transparent
    );

    box-shadow: 0 0 10px rgba(0,200,83,0.5);
}

/* 🔥 NAV CARD */
.nav-card {
    flex: 1;

    background: #1c2330;
    border-radius: 14px;

    padding: 10px 0;

    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;

    gap: 6px;

    border: 1px solid transparent;

    transition: all 0.2s ease;
}

/* 🔥 ICON */
.nav-card svg {
    width: 22px;
    height: 22px;

    stroke: #8a94a6;
    stroke-width: 2.5;

    transition: all 0.2s ease;
}

/* 🔥 TEXT */
.nav-card span {
    font-size: 10px;
    color: #8a94a6;
    transition: all 0.2s ease;
}

/* 🔥 ACTIVE STATE */
.nav-card.active {
    background: linear-gradient(
        180deg,
        rgba(0, 200, 83, 0.15),
        rgba(0, 200, 83, 0.05)
    );

    border: 1px solid rgba(0, 200, 83, 0.4);

    box-shadow:
        0 0 12px rgba(0, 200, 83, 0.3),
        inset 0 0 6px rgba(0, 200, 83, 0.15);
}

.nav-card.active svg {
    stroke: #00c853;
}

.nav-card.active span {
    color: #00c853;
}

/* 🔥 PRESS EFFECT */
.nav-card:active {
    transform: scale(0.92);
}

/* 🔥 SAFE AREA (for phones like iPhone / Android gesture bar) */
.bottom-nav {
    padding-bottom: calc(20px + env(safe-area-inset-bottom));
}
.nav-card.active {
    animation: glowPulse 1.5s infinite;
}

@keyframes glowPulse {
    0%, 100% { box-shadow: 0 0 10px rgba(0,200,83,0.3); }
    50% { box-shadow: 0 0 18px rgba(0,200,83,0.6); }
}
.nav-card svg * {
    fill: none !important;   /* 🔥 FORCE remove black */
}
/* 🔥 ONLY wallet icon fix */
.wallet-btn svg,
.wallet-btn svg * {
    fill: none !important;
    stroke: #00c853;
    stroke-width: 2.2;
}
.card-icons {
    display: flex;
    align-items: center;
    gap: 8px;
}
.pay-logo {
    height: 30px;
    object-fit: contain;
}
.topup-card:nth-child(2) div:last-child {
    text-align: center;
    width: 100%;
}
.input-select {
    width: 100%;
    background: #11151c;
    padding: 12px;
    border-radius: 10px;
    color: #ccc;
    border: none;
    outline: none;

    appearance: none; /* remove default arrow */
    -webkit-appearance: none;

    position: relative;
}

/* custom arrow */
.input-select {
    background-image: url("data:image/svg+xml;utf8,<svg fill='gray' height='20' viewBox='0 0 24 24' width='20'><path d='M7 10l5 5 5-5z'/></svg>");
    background-repeat: no-repeat;
    background-position: right 10px center;
}
.input-select {
    width: 100%;
    background: #11151c;
    padding: 12px;
    border-radius: 10px;
    color: #ccc;

    border: 1px solid rgba(255,255,255,0.15); /* 🔥 THIS is missing */
}

.method-link {
    text-decoration: none;
    color: inherit;
    display: block;
}

.method-card {
    cursor: pointer;
    transition: 0.2s;
}

.method-card:active {
    transform: scale(0.96);
    opacity: 0.9;
}
.method-card:hover {
    border-color: rgba(0,200,83,0.5);
    box-shadow: 0 0 12px rgba(0,200,83,0.2);
}
a {
    -webkit-tap-highlight-color: transparent;
    outline: none;
}
</style>
</head>

<script>
  document.addEventListener("DOMContentLoaded", () => {
    loadCountries();
});
  const blockedCountries = [
    "Iran",
    "North Korea",
    "Syria",
    "Cuba",
    "Afghanistan",
    "Sudan",
    "South Sudan",
    "Russia",
    "Belarus"
];
async function loadCountries() {
    const select = document.getElementById("countrySelect");

    select.innerHTML = "<option>Loading...</option>";

    try {
        const res = await fetch("https://countriesnow.space/api/v0.1/countries");
        const json = await res.json();
        const data = json.data;

        select.innerHTML = "";

        data
          .filter(c => 
            !blockedCountries.some(b =>
              c.country.toLowerCase().includes(b.toLowerCase())
            )
          )
          .sort((a, b) =>
            a.country.localeCompare(b.country)
          )
          .forEach(country => {
            const option = document.createElement("option");
            option.value = country.country;
            option.textContent = country.country;
            select.appendChild(option);
          });

        // optional (remove if not defined)
        // detectUserCountry(select);

    } catch (err) {
        console.error("API failed, using fallback list");

        const fallbackCountries = [
            "Albania","Algeria","Andorra","Angola","Argentina","Armenia","Australia","Austria",
            "Azerbaijan","Bahrain","Bangladesh","Belgium","Benin","Bolivia","Bosnia and Herzegovina",
            "Botswana","Brazil","Bulgaria","Burkina Faso","Cambodia","Cameroon","Canada","Chile",
            "China","Colombia","Costa Rica","Croatia","Cyprus","Czech Republic","Denmark","Dominican Republic",
            "Ecuador","Egypt","Estonia","Ethiopia","Finland","France","Georgia","Germany","Ghana",
            "Greece","Guatemala","Hong Kong","Hungary","Iceland","India","Indonesia","Ireland","Israel",
            "Italy","Japan","Jordan","Kazakhstan","Kenya","Kuwait","Latvia","Lebanon","Lithuania",
            "Luxembourg","Malaysia","Mexico","Morocco","Netherlands","New Zealand","Nigeria","Norway",
            "Oman","Pakistan","Peru","Philippines","Poland","Portugal","Qatar","Romania","Rwanda",
            "Saudi Arabia","Serbia","Singapore","Slovakia","Slovenia","South Africa","South Korea",
            "Spain","Sri Lanka","Sweden","Switzerland","Tanzania","Thailand","Tunisia","Turkey",
            "Uganda","Ukraine","United Arab Emirates","United Kingdom","United States","Vietnam","Zambia","Zimbabwe"
        ];

        select.innerHTML = "";

        fallbackCountries
          .filter(country => 
            !blockedCountries.some(b =>
              country.toLowerCase().includes(b.toLowerCase())
            )
          )
          .sort()
          .forEach(country => {
            const option = document.createElement("option");
            option.value = country;
            option.textContent = country;
            select.appendChild(option);
          });
    }
}
const navCards = document.querySelectorAll(".nav-card");

navCards.forEach(card => {
    card.addEventListener("click", () => {

        // remove active from all
        navCards.forEach(c => c.classList.remove("active"));

        // add to clicked one
        card.classList.add("active");

    });
});

</script>
